name: Deploy

on:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    strategy:
      matrix:
        command: [ lint, typecheck ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: ESLint cache
        uses: actions/cache@v5
        if: matrix.command == 'lint:ci'
        with:
          path: .eslintcache
          key: ${{ runner.os }}-node

      - name: ${{ matrix.command }}
        run: bun ${{ matrix.command }}

  release:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ check ]
    permissions:
      contents: 'write'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: 'bun run build'

      - name: Configure Git User
        run: |
          git config --global user.email "github@mariomh.com"
          git config --global user.name "$GITHUB_ACTOR"

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=proxystudio
